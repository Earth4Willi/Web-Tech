kind = "web"
previewPath = "/"
title = "ICT233 Web Technologies Study Guide"
version = "1.0.0"
id = "artifacts/ict233-study-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25422

[services.development]
run = "pnpm --filter @workspace/ict233-study-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ict233-study-guide", "run", "build" ]
publicDir = "artifacts/ict233-study-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25422"
BASE_PATH = "/"
